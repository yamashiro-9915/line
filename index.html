<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ブラウザで開いてください</title>
    <style>
        :root {
            --bg-color: rgba(255, 255, 255, 0.7);
            --accent-color: #007AFF;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #f0f0f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            color: #333;
        }

        .card {
            background: var(--bg-color);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.1);
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        h2 {
            font-size: 1.2rem;
            margin-bottom: 20px;
        }

        .url-box {
            background: #fff;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #ddd;
            word-break: break-all;
            font-size: 0.9rem;
            margin-bottom: 15px;
            cursor: pointer;
            transition: background 0.3s;
        }

        .url-box:active {
            background: #f0f0f0;
        }

        .btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
        }

        .instruction {
            margin-top: 25px;
            text-align: left;
            font-size: 0.85rem;
            line-height: 1.6;
            color: #666;
        }

        .copy-toast {
            position: fixed;
            top: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 20px;
            display: none;
        }
    </style>
</head>
<body>

    <div id="toast" class="copy-toast">コピーしました！</div>

    <div class="card">
        <h2>ブラウザで開き直してください</h2>
        <p style="font-size: 0.9rem;">このページは、SafariやChromeなどの標準ブラウザで開く必要があります。</p>
        
        <div class="url-box" id="urlBox" onclick="copyUrl()">
            https://yamashiro-9915.github.io/Yamashirocityapp/
        </div>
        <button class="btn" onclick="copyUrl()">URLをコピーする</button>

        <div class="instruction">
            <strong>【開き方】</strong><br>
            右上の ⋮ から「ブラウザで開く」を選択
        </div>
    </div>

    <script>
        function copyUrl() {
            const urlText = document.getElementById('urlBox').innerText;
            navigator.clipboard.writeText(urlText).then(() => {
                const toast = document.getElementById('toast');
                toast.style.display = 'block';
                setTimeout(() => {
                    toast.style.display = 'none';
                }, 2000);
            });
        }
    </script>
</body>
</html>
